name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️ Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3️ Build Backend Image
    - name: Build Backend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/complete_project:latest .

    # 4️ Push Backend
    - name: Push Backend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/complete_project:latest

    # 5️ Build Frontend
    - name: Build Frontend
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/streamlit_carapp:latest ./frontend

    # 6️ Push Frontend
    - name: Push Frontend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/streamlit_carapp:latest

    # 7️ Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd mlops-complete-project
          docker compose down
          docker pull ${{ secrets.DOCKER_USERNAME }}/complete_project:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/streamlit_carapp:latest
          docker compose up -d